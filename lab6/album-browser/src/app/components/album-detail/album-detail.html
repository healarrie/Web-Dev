<div *ngIf="album" style="padding: 20px;">
  <h2>Album Details</h2>
  <p><strong>ID:</strong> {{ album.id }}</p>
  <p><strong>User ID:</strong> {{ album.userId }}</p>

  <div style="margin: 20px 0;">
    <label>Edit Title: </label>
    <input type="text" [(ngModel)]="tempTitle" style="width: 300px; padding: 5px;">
    <button (click)="save()">Save</button>
  </div>

  <div style="display: flex; gap: 10px;">
    <button routerLink="/albums">Back</button>
    <button [routerLink]="['/albums', album.id, 'photos']">Photos</button>
  </div>
</div>

<div *ngIf="!album">Loading...</div>
