<div class="container">
  <h1>Kaspi Shop</h1>

  <div class="categories">
    <button *ngFor="let c of categories"
            (click)="selectCategory(c.id)"
            [class.active]="selectedCategoryId === c.id">
      {{ c.name }}
    </button>
  </div>

  <p *ngIf="!selectedCategoryId">Выберите категорию</p>

  <app-product-list *ngIf="selectedCategoryId"
                    [products]="selectedProducts">
  </app-product-list>
</div>
