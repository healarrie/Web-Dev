<div class="product-grid">
  <div *ngFor="let p of products" class="product-card">
    <div class="product-img-container">
      <img [src]="p.image" [alt]="p.name" class="product-image">
    </div>

    <h3>{{ p.name }}</h3>
    <p class="rating">Рейтинг: {{ p.rating }} ⭐</p>
    <p class="description">{{ p.description }}</p>
    <p class="price">Цена: <strong>{{ p.price }} ₸</strong></p>

    <div class="actions">
      <button (click)="p.likes = p.likes + 1" class="like-btn">
        ❤ {{ p.likes }}
      </button>

      <a [href]="p.link" target="_blank" class="buy-link">
        Купить в Kaspi
      </a>
    </div>
  </div>
</div>
